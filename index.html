<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gtrnat</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --void: #050508;
    --surface: #0D0D14;
    --violet: #7B61FF;
    --glow: #C084FC;
    --text: #E8E8F0;
    --muted: #4A4A6A;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--void);
    overflow: hidden;
    font-family: 'Space Grotesk', sans-serif;
    color: var(--text);
  }

  /* ── Canvas background ── */
  #bg {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* ── Noise overlay ── */
  .noise {
    position: fixed;
    inset: 0;
    z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.03;
    pointer-events: none;
  }

  /* ── Radial vignette ── */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 2;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(5,5,8,0.85) 100%);
    pointer-events: none;
  }

  /* ── Main container ── */
  .stage {
    position: relative;
    z-index: 10;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  /* ── Glitch name ── */
  .name-wrap {
    position: relative;
    display: inline-block;
    line-height: 1;
  }

  .name {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(4rem, 14vw, 12rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text);
    position: relative;
    display: inline-block;
    text-transform: lowercase;
    user-select: none;
    /* soft glow */
    filter: drop-shadow(0 0 40px rgba(123,97,255,0.35)) drop-shadow(0 0 80px rgba(192,132,252,0.15));
  }

  /* Glitch layers */
  .name::before,
  .name::after {
    content: attr(data-text);
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  .name::before {
    color: #C084FC;
    animation: glitch-a 3.5s infinite steps(1);
    clip-path: polygon(0 20%, 100% 20%, 100% 45%, 0 45%);
  }

  .name::after {
    color: #7B61FF;
    animation: glitch-b 4.1s infinite steps(1);
    clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
  }

  @keyframes glitch-a {
    0%,89%,91%,93%,100% { transform: none; opacity: 0; }
    90%  { transform: translateX(-6px) skewX(-3deg); opacity: 0.85; }
    92%  { transform: translateX(4px)  skewX(2deg);  opacity: 0.6;  }
  }

  @keyframes glitch-b {
    0%,76%,79%,82%,100% { transform: none; opacity: 0; }
    77%  { transform: translateX(8px)  skewX(4deg);  opacity: 0.7; }
    80%  { transform: translateX(-5px) skewX(-2deg); opacity: 0.5; }
    81%  { transform: translateX(3px);               opacity: 0.8; }
  }

  /* Scanline sweep on the name */
  .name-scan {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      180deg,
      transparent 0px,
      transparent 3px,
      rgba(123,97,255,0.04) 3px,
      rgba(123,97,255,0.04) 4px
    );
    pointer-events: none;
    border-radius: 2px;
  }

  /* ── Underscore cursor blink ── */
  .cursor {
    display: inline-block;
    width: clamp(0.25rem, 1.2vw, 0.9rem);
    height: clamp(3.2rem, 11vw, 9.5rem);
    background: var(--violet);
    vertical-align: middle;
    margin-left: 6px;
    animation: blink 1.1s step-end infinite;
    box-shadow: 0 0 18px rgba(123,97,255,0.8);
    border-radius: 2px;
  }

  @keyframes blink {
    0%,49% { opacity: 1; }
    50%,100% { opacity: 0; }
  }

  /* ── Tagline ── */
  .tagline {
    margin-top: 2rem;
    font-size: clamp(0.7rem, 1.5vw, 1rem);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    animation: fade-up 1.4s 0.6s both ease-out;
  }

  .tagline span {
    color: var(--violet);
  }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Corner decorations ── */
  .corner {
    position: fixed;
    width: 60px; height: 60px;
    z-index: 10;
    opacity: 0.35;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner--tl { top: 24px; left: 24px; }
  .corner--tr { top: 24px; right: 24px; transform: scaleX(-1); }
  .corner--bl { bottom: 24px; left: 24px; transform: scaleY(-1); }
  .corner--br { bottom: 24px; right: 24px; transform: scale(-1); }

  /* ── Floating orbs ── */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 3;
  }
  .orb-1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(123,97,255,0.18) 0%, transparent 70%);
    top: -100px; left: -100px;
    animation: drift-1 18s ease-in-out infinite alternate;
  }
  .orb-2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(192,132,252,0.12) 0%, transparent 70%);
    bottom: -80px; right: -80px;
    animation: drift-2 22s ease-in-out infinite alternate;
  }
  .orb-3 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(99,77,220,0.10) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: drift-3 14s ease-in-out infinite alternate;
  }

  @keyframes drift-1 {
    from { transform: translate(0,0); }
    to   { transform: translate(120px, 80px); }
  }
  @keyframes drift-2 {
    from { transform: translate(0,0); }
    to   { transform: translate(-90px, -60px); }
  }
  @keyframes drift-3 {
    from { transform: translate(-50%,-50%) scale(1); }
    to   { transform: translate(-50%,-50%) scale(1.4); }
  }

  /* ── Status dot ── */
  .status {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    color: var(--muted);
    opacity: 0;
    animation: fade-up 1s 1.2s both;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 8px rgba(74,222,128,0.8);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100% { box-shadow: 0 0 6px rgba(74,222,128,0.8); transform: scale(1); }
    50%     { box-shadow: 0 0 14px rgba(74,222,128,1);  transform: scale(1.3); }
  }

  /* ── Entry animation for name ── */
  .name-wrap {
    animation: fade-up 0.9s 0.1s both cubic-bezier(0.22,1,0.36,1);
  }

  @media (prefers-reduced-motion: reduce) {
    .name::before, .name::after, .cursor, .orb-1, .orb-2, .orb-3 { animation: none; }
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="noise"></div>
<div class="vignette"></div>

<!-- Floating orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- Corner decorators -->
<div class="corner corner--tl">
  <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0 60 L0 0 L60 0" stroke="#7B61FF" stroke-width="1.5" fill="none"/>
    <path d="M0 46 L0 0 L46 0" stroke="#7B61FF" stroke-width="0.5" fill="none" opacity="0.4"/>
    <circle cx="0" cy="0" r="3" fill="#7B61FF"/>
  </svg>
</div>
<div class="corner corner--tr">
  <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0 60 L0 0 L60 0" stroke="#7B61FF" stroke-width="1.5" fill="none"/>
    <path d="M0 46 L0 0 L46 0" stroke="#7B61FF" stroke-width="0.5" fill="none" opacity="0.4"/>
    <circle cx="0" cy="0" r="3" fill="#7B61FF"/>
  </svg>
</div>
<div class="corner corner--bl">
  <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0 60 L0 0 L60 0" stroke="#7B61FF" stroke-width="1.5" fill="none"/>
    <path d="M0 46 L0 0 L46 0" stroke="#7B61FF" stroke-width="0.5" fill="none" opacity="0.4"/>
    <circle cx="0" cy="0" r="3" fill="#7B61FF"/>
  </svg>
</div>
<div class="corner corner--br">
  <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0 60 L0 0 L60 0" stroke="#7B61FF" stroke-width="1.5" fill="none"/>
    <path d="M0 46 L0 0 L46 0" stroke="#7B61FF" stroke-width="0.5" fill="none" opacity="0.4"/>
    <circle cx="0" cy="0" r="3" fill="#7B61FF"/>
  </svg>
</div>

<!-- Content -->
<div class="stage">
  <div class="name-wrap">
    <span class="name" data-text="gtrnat">gtrnat</span>
    <span class="cursor"></span>
    <div class="name-scan"></div>
  </div>
  <div class="tagline">// <span>building</span> things that matter</div>
</div>

<!-- Status -->
<div class="status">
  <div class="dot"></div>
  <span>online &amp; available</span>
</div>

<script>
/* ══════════════════════════════════════════════
   Warp Mesh Grid — procedural canvas animation
   Uses perspective-projected grid that breathes
   and warps from a central focal point.
══════════════════════════════════════════════ */
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');

let W, H, mouse = { x: 0.5, y: 0.5 };

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

window.addEventListener('mousemove', e => {
  mouse.x = e.clientX / W;
  mouse.y = e.clientY / H;
});

// Touch support
window.addEventListener('touchmove', e => {
  if (e.touches.length) {
    mouse.x = e.touches[0].clientX / W;
    mouse.y = e.touches[0].clientY / H;
  }
}, { passive: true });

/* ── Particle field ── */
const PARTICLE_COUNT = 90;
const particles = [];

for (let i = 0; i < PARTICLE_COUNT; i++) {
  particles.push({
    x: Math.random(),
    y: Math.random(),
    vx: (Math.random() - 0.5) * 0.0003,
    vy: (Math.random() - 0.5) * 0.0003,
    size: Math.random() * 1.4 + 0.4,
    alpha: Math.random() * 0.5 + 0.1,
    phase: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.008 + 0.004,
  });
}

/* ── Grid config ── */
const GRID_COLS = 22;
const GRID_ROWS = 14;

function project(nx, ny, t) {
  // Perspective warp: points further from center get pulled toward it
  const cx = 0.5 + (mouse.x - 0.5) * 0.08;
  const cy = 0.5 + (mouse.y - 0.5) * 0.08;

  const dx = nx - cx;
  const dy = ny - cy;
  const dist = Math.sqrt(dx*dx + dy*dy);

  // Barrel + breathe
  const breathe = 1 + Math.sin(t * 0.4) * 0.012;
  const warp    = 1 - dist * dist * 0.18;
  const ripple  = Math.sin(dist * 14 - t * 1.2) * 0.008;

  const wx = cx + (dx * warp + dx * ripple) * breathe;
  const wy = cy + (dy * warp + dy * ripple) * breathe;

  return { x: wx * W, y: wy * H };
}

function lerpColor(a, b, t) {
  const ah = parseInt(a.slice(1),16), bh = parseInt(b.slice(1),16);
  const ar = (ah>>16)&0xff, ag=(ah>>8)&0xff, ab=ah&0xff;
  const br = (bh>>16)&0xff, bg=(bh>>8)&0xff, bb=bh&0xff;
  return `rgb(${Math.round(ar+(br-ar)*t)},${Math.round(ag+(bg-ag)*t)},${Math.round(ab+(bb-ab)*t)})`;
}

let t = 0;

function draw() {
  t += 0.016;

  ctx.clearRect(0, 0, W, H);

  /* ── Background fill ── */
  ctx.fillStyle = '#050508';
  ctx.fillRect(0, 0, W, H);

  /* ── Warp grid ── */
  const gridAlpha = 0.12 + Math.sin(t * 0.3) * 0.03;

  // Horizontal lines
  for (let r = 0; r <= GRID_ROWS; r++) {
    const ny = r / GRID_ROWS;
    const lineDist = Math.abs(ny - 0.5);
    const lineAlpha = gridAlpha * (1 - lineDist * 0.8);

    ctx.beginPath();
    for (let c = 0; c <= GRID_COLS; c++) {
      const nx = c / GRID_COLS;
      const p = project(nx, ny, t);
      if (c === 0) ctx.moveTo(p.x, p.y);
      else         ctx.lineTo(p.x, p.y);
    }
    ctx.strokeStyle = `rgba(123,97,255,${lineAlpha})`;
    ctx.lineWidth = 0.6;
    ctx.stroke();
  }

  // Vertical lines
  for (let c = 0; c <= GRID_COLS; c++) {
    const nx = c / GRID_COLS;
    const lineDist = Math.abs(nx - 0.5);
    const lineAlpha = gridAlpha * (1 - lineDist * 0.8);

    ctx.beginPath();
    for (let r = 0; r <= GRID_ROWS; r++) {
      const ny = r / GRID_ROWS;
      const p = project(nx, ny, t);
      if (r === 0) ctx.moveTo(p.x, p.y);
      else         ctx.lineTo(p.x, p.y);
    }
    ctx.strokeStyle = `rgba(123,97,255,${lineAlpha})`;
    ctx.lineWidth = 0.6;
    ctx.stroke();
  }

  // Grid intersection nodes — highlight some
  for (let r = 0; r <= GRID_ROWS; r++) {
    for (let c = 0; c <= GRID_COLS; c++) {
      const nx = c / GRID_COLS;
      const ny = r / GRID_ROWS;
      const p  = project(nx, ny, t);
      const pulse = (Math.sin(t * 1.5 + c * 0.7 + r * 1.1) + 1) / 2;
      const dist = Math.sqrt((nx-0.5)**2 + (ny-0.5)**2);

      if (pulse > 0.82 && dist < 0.45) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 1.5 * pulse, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(192,132,252,${pulse * 0.7})`;
        ctx.fill();
      }
    }
  }

  /* ── Particles ── */
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.phase += p.speed;

    // Wrap
    if (p.x < 0) p.x = 1;
    if (p.x > 1) p.x = 0;
    if (p.y < 0) p.y = 1;
    if (p.y > 1) p.y = 0;

    const pulse = (Math.sin(p.phase) + 1) * 0.5;
    const alpha = p.alpha * (0.5 + pulse * 0.5);
    const sx = p.x * W;
    const sy = p.y * H;

    // Glow
    const g = ctx.createRadialGradient(sx, sy, 0, sx, sy, p.size * 4);
    g.addColorStop(0,   `rgba(192,132,252,${alpha})`);
    g.addColorStop(0.5, `rgba(123,97,255,${alpha * 0.3})`);
    g.addColorStop(1,   `rgba(123,97,255,0)`);

    ctx.beginPath();
    ctx.arc(sx, sy, p.size * 4, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(sx, sy, p.size * 0.8, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(232,232,240,${alpha * 0.9})`;
    ctx.fill();
  }

  /* ── Connect nearby particles ── */
  const LINK_DIST = W * 0.1;
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const ax = particles[i].x * W, ay = particles[i].y * H;
      const bx = particles[j].x * W, by = particles[j].y * H;
      const d  = Math.sqrt((ax-bx)**2 + (ay-by)**2);
      if (d < LINK_DIST) {
        const alpha = (1 - d / LINK_DIST) * 0.12;
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(bx, by);
        ctx.strokeStyle = `rgba(123,97,255,${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }

  /* ── Central radial bloom ── */
  const bloom = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.min(W,H) * 0.45);
  const bloomPulse = (Math.sin(t * 0.5) + 1) / 2;
  bloom.addColorStop(0,   `rgba(123,97,255,${0.04 + bloomPulse * 0.03})`);
  bloom.addColorStop(0.6, `rgba(99,77,220,${0.02})`);
  bloom.addColorStop(1,   `rgba(5,5,8,0)`);
  ctx.fillStyle = bloom;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
